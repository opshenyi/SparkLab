services:
  backend:
    build:
      context: ./server
    image: sparklab-backend:local
    pull_policy: build
    container_name: sparklab-backend
    restart: unless-stopped
    environment:
      PORT: "3001"
      GIN_MODE: ${GIN_MODE:-release}
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/spark_lab.db}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      AUTH_MAX_FAILED_ATTEMPTS: ${AUTH_MAX_FAILED_ATTEMPTS:-8}
      AUTH_ATTEMPT_WINDOW_MINUTES: ${AUTH_ATTEMPT_WINDOW_MINUTES:-10}
      AUTH_LOCKOUT_MINUTES: ${AUTH_LOCKOUT_MINUTES:-10}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      DOCKER_HOST: ${DOCKER_HOST:-unix:///var/run/docker.sock}
      DOCKER_API_HTTP_TIMEOUT_SEC: ${DOCKER_API_HTTP_TIMEOUT_SEC:-300}
      GITHUB_REPO: ${GITHUB_REPO:-opshenyi/SparkLab}
      GITHUB_BRANCH: ${GITHUB_BRANCH:-main}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      HOST_PROJECT_DIR: ${HOST_PROJECT_DIR:-}
      APP_REPO_DIR: /app/repo
      SPARKLAB_UPDATE_DIR: ${SPARKLAB_UPDATE_DIR:-/app/data}
      SPARKLAB_BUILD_PULL: ${SPARKLAB_BUILD_PULL:-false}
      UPDATE_CHECK_CACHE_SECONDS: ${UPDATE_CHECK_CACHE_SECONDS:-300}
      UPDATE_SCRIPT_TIMEOUT_SECONDS: ${UPDATE_SCRIPT_TIMEOUT_SECONDS:-1200}
      MAX_CONTAINERS_PER_USER: ${MAX_CONTAINERS_PER_USER:-3}
      AUTO_STOP_TIMEOUT: ${AUTO_STOP_TIMEOUT:-1800000}
      CONTAINER_JANITOR_INTERVAL_SECONDS: ${CONTAINER_JANITOR_INTERVAL_SECONDS:-60}
      CONTAINER_CREATING_TIMEOUT_MINUTES: ${CONTAINER_CREATING_TIMEOUT_MINUTES:-10}
      LAB_CONTAINER_MIN_CPU: ${LAB_CONTAINER_MIN_CPU:-0.1}
      LAB_CONTAINER_DEFAULT_CPU: ${LAB_CONTAINER_DEFAULT_CPU:-1}
      LAB_CONTAINER_MAX_CPU: ${LAB_CONTAINER_MAX_CPU:-2}
      LAB_CONTAINER_MIN_MEMORY_MB: ${LAB_CONTAINER_MIN_MEMORY_MB:-128}
      LAB_CONTAINER_DEFAULT_MEMORY_MB: ${LAB_CONTAINER_DEFAULT_MEMORY_MB:-512}
      LAB_CONTAINER_MAX_MEMORY_MB: ${LAB_CONTAINER_MAX_MEMORY_MB:-2048}
      LAB_CONTAINER_PIDS_LIMIT: ${LAB_CONTAINER_PIDS_LIMIT:-256}
      LAB_CONTAINER_NETWORK_MODE: ${LAB_CONTAINER_NETWORK_MODE:-bridge}
      LAB_CONTAINER_HOST_BIND_IP: ${LAB_CONTAINER_HOST_BIND_IP:-0.0.0.0}
      LAB_CONTAINER_ALLOW_STATIC_HOST_PORTS: ${LAB_CONTAINER_ALLOW_STATIC_HOST_PORTS:-false}
      LAB_CONTAINER_ALLOW_HOST_BINDS: ${LAB_CONTAINER_ALLOW_HOST_BINDS:-false}
      LAB_CONTAINER_HOST_BIND_ROOT: ${LAB_CONTAINER_HOST_BIND_ROOT:-}
      LAB_CONTAINER_ALLOW_RESTART_POLICY: ${LAB_CONTAINER_ALLOW_RESTART_POLICY:-false}
      LAB_CONTAINER_READONLY_ROOTFS: ${LAB_CONTAINER_READONLY_ROOTFS:-false}
      LAB_CONTAINER_CAP_ADD: ${LAB_CONTAINER_CAP_ADD:-}
      SEED_ON_START: ${SEED_ON_START:-true}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      SPARKLAB_BOOTSTRAP_ADMIN_USERNAME: ${SPARKLAB_BOOTSTRAP_ADMIN_USERNAME:-admin}
      SPARKLAB_BOOTSTRAP_ADMIN_PASSWORD: ${SPARKLAB_BOOTSTRAP_ADMIN_PASSWORD:-}
      SPARKLAB_BOOTSTRAP_ADMIN_DISPLAY_NAME: ${SPARKLAB_BOOTSTRAP_ADMIN_DISPLAY_NAME:-管理员}
      SPARKLAB_BOOTSTRAP_CREDENTIALS_FILE: ${SPARKLAB_BOOTSTRAP_CREDENTIALS_FILE:-/app/data/bootstrap-admin.txt}
      SPARKLAB_DEMO_STUDENT_PASSWORD: ${SPARKLAB_DEMO_STUDENT_PASSWORD:-}
      SPARKLAB_ALLOW_INSECURE_DEFAULTS: ${SPARKLAB_ALLOW_INSECURE_DEFAULTS:-false}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - "${HOST_PROJECT_DIR:-.}:/app/repo"
      - "${HOST_PROJECT_DIR:-.}/data/server:/app/data"
      - "${HOST_PROJECT_DIR:-.}/data/uploads:/app/uploads"
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_LAB_HOST: ${NEXT_PUBLIC_LAB_HOST:-}
        NEXT_PUBLIC_LAB_PROTOCOL: ${NEXT_PUBLIC_LAB_PROTOCOL:-http}
    image: sparklab-web:local
    pull_policy: build
    container_name: sparklab-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "3000"
      SERVER_URL: ${SERVER_URL:-http://backend:3001}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_LAB_HOST: ${NEXT_PUBLIC_LAB_HOST:-}
      NEXT_PUBLIC_LAB_PROTOCOL: ${NEXT_PUBLIC_LAB_PROTOCOL:-http}
      SPARK_AI_API_KEY: ${SPARK_AI_API_KEY:-}
      SPARK_AI_API_URL: ${SPARK_AI_API_URL:-}
      SPARKLAB_ENABLE_DEBUG_PAGES: ${SPARKLAB_ENABLE_DEBUG_PAGES:-false}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - "${HOST_PROJECT_DIR:-.}/data/web-uploads:/app/public/uploads"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
